<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kylhab Marketing | Premium Dropshipping</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --light: #f8fafc;
            --text-main: #334155;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            background-color: var(--white);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

        /* SaaS Navbar */
        header {
            padding: 18px 0;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--dark); letter-spacing: -0.5px; }

        /* Hero Section */
        .hero { padding: 100px 0 60px; text-align: center; }
        .hero h1 { font-size: 3rem; color: var(--dark); margin-bottom: 16px; letter-spacing: -1.5px; }
        .hero p { font-size: 1.2rem; max-width: 600px; margin: 0 auto 32px; color: #64748b; }

        /* SaaS Buttons */
        .btn-wa {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-wa:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Grid & Cards */
        .section-title { font-size: 1.8rem; color: var(--dark); margin-bottom: 40px; text-align: center; letter-spacing: -0.5px; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 32px;
            margin-bottom: 80px;
        }

        .product-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #f1f5f9;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            border-color: #e2e8f0;
        }

        .product-img { width: 100%; height: 240px; object-fit: cover; background: #f8fafc; }

        .product-info { padding: 24px; }
        .product-title { font-size: 1.1rem; font-weight: 700; color: var(--dark); margin: 0 0 8px; }
        .product-price { color: var(--primary); font-weight: 700; font-size: 1.2rem; margin-bottom: 12px; }
        .product-desc { font-size: 0.9rem; color: #64748b; margin-bottom: 20px; }

        .whatsapp-btn {
            width: 100%;
            background: #f1f5f9;
            color: var(--dark);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .whatsapp-btn:hover { background: #25d366; color: white; }

        footer { padding: 60px 0; border-top: 1px solid #f1f5f9; text-align: center; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <nav class="container">
            <div class="logo">Kylhab.</div>
            <a href="https://wa.me/254723652430" class="btn-wa">Order Now</a>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Quality Vehicles & Lifestyle Essentials.</h1>
            <p>Your premium partner for sourced products and verified autos in Nairobi.</p>
        </section>

        <h2 class="section-title">🚗 Featured Autos</h2>
        <div class="products-grid" id="vehiclesGrid"></div>

        <h2 class="section-title">🔥 Bestselling Products</h2>
        <div class="products-grid" id="productsGrid"></div>
    </main>

    <footer>
        <p>&copy; 2026 Kylhab Marketing. Delivered with precision.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
