<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kylhab Marketing – Quality Products Delivered in Nairobi</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<!-- Header -->
<header>
    <div class="container">
        <h1>Kylhab Marketing</h1>
        <p>Your trusted dropshipping partner in Nairobi</p>
        <div class="contact-header">
            <a href="https://wa.me/254723652430" target="_blank"><i class="fab fa-whatsapp"></i> Order on WhatsApp</a>
            <a href="tel:+254723652430"><i class="fas fa-phone-alt"></i> Call Us</a>
        </div>
    </div>
</header>

<!-- Product Grid -->
<main class="container">
    <h2>🔥 Our Bestsellers</h2>
    <div class="products-grid" id="productsGrid">
        <!-- Products will be loaded from script.js -->
    </div>
</main>

<!-- Simple Inquiry Form (for bulk/wholesale) -->
<section class="inquiry container">
    <h3>📦 Need a specific product? Ask us!</h3>
    <form id="inquiryForm">
        <input type="text" id="inquiryName" placeholder="Your name" required>
        <input type="email" id="inquiryEmail" placeholder="Your email">
        <input type="text" id="inquiryProduct" placeholder="Product you're looking for" required>
        <textarea id="inquiryMessage" rows="3" placeholder="Any details..."></textarea>
        <button type="submit">Send via WhatsApp <i class="fab fa-whatsapp"></i></button>
    </form>
</section>

<!-- Footer -->
<footer>
    <div class="container">
        <p>&copy; 2026 Kylhab Marketing – Nairobi, Kenya</p>
        <p>Delivery within 2-5 business days | M-PESA accepted</p>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
